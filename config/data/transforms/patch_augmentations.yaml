train:
  _target_: torchvision.transforms.Compose
  transforms:
    - _target_: src.transforms.transforms.BaseTransform
      shuffle: true
      random_seed: ${seed}

    - _target_: src.transforms.transforms.ShufflePatch
      random_seed: ${seed}

    - _target_: src.transforms.transforms.RandomPatchTimeShift
      random_seed: ${seed}
      max_shift_frac: 0.4
      max_prob: 0.3

    - _target_: src.transforms.transforms.RandomPatchFlipping
      random_seed: ${seed}
      max_prob: 0.3

    - _target_: src.transforms.transforms.RandomSignalZeroing
      random_seed: ${seed}
      max_prob: 0.2

    - _target_: src.transforms.transforms.ZScorePerSignal

val:
  _target_: torchvision.transforms.Compose
  transforms:
    - _target_: src.transforms.transforms.ZScorePerSignal