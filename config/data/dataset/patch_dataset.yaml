# config/data/dataset/patch_dataset.yaml

dataset:
  class_name: "src.dataset.dataset.EGMPatchDataset"

dataloader:
  class_name: torch.utils.data.DataLoader

collate_fn: "src.dataset.collate.collate_patches"

params:
  startswith: "LA_WMP2"
  filter_utilized: False
  segment_ms: 100
  num_traces: 300
  controls_time_gaussian_std: 20
  readjustonce: True
  filter_center: null

