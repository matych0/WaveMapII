# config/model/atn_pooling_1d.yaml

name: "atn_pooling_1d"

model_class: "src.model.cox_mil_resnet.CoxAttentionResnet"

resnet:
  dim: 1
  in_features: 24
  kernel_size: 5
  stem_kernel_size: 17
  blocks: [3, 3, 3, 3]
  features: [24, 32, 48, 64]
  activation: "LReLU"
  downsampling_factor: 2
  normalization: "BatchN"
  preactivation: false
  trace_stages: true

mil_head:
  input_size: 64
  hidden_size: 64
  attention_hidden_size: 32
  output_size: 1
  dropout: true
  dropout_prob: ${training.hparams.dropout_prob}
