# ------------------------------------------------------------------
# Team Standard Environment: "Base"
# Python: 3.12
# PyTorch: 2.9.x (Latest Stable, Oct 2025)
# CUDA: 12.6 (via pytorch-cuda)
# ------------------------------------------------------------------
name: ml-local-py312

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.12.*
  - pip

  # ----- ML / Data Science -----
  - numpy=2.2.*
  - pandas=2.2.*
  - scikit-learn=1.6.*
  - scipy=1.15.*
  - matplotlib=3.10.*
  - seaborn=0.13.*
  - psycopg2
  - sqlalchemy=2.0.*

  # ----- Optimization -----
  - optuna=4.6.*

  # ----- Data formats -----
  - h5py=3.12.*
  - pyaml

  # ----- NLP / Models -----
  - transformers

  # ----- MLOps -----
  - mlflow=3.4.*
  - hydra-core=1.3.*

  # ----- Utilities -----
  - tqdm=4.67.*
  - python-dotenv

  # ----- PIP-only packages -----
  - pip:
      # Tracking
      - wandb==0.19.*

      # Optuna + Hydra
      - hydra-optuna-sweeper

      # Survival analysis
      - torchsurv
      - torchtuples

      # Ray stack
      - ray[tune]==2.53.*

      # PyTorch (CUDA 12.6)
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.9.*
      - torchvision==0.24.*
      - torchaudio==2.9.*
